services:
  web:
    image: "kaspernj/rails-development-base-ubuntu-25-10"
    depends_on:
      - mariadb
      - postgres
      - redis
    mem_limit: 8G
    networks:
      default:
        ipv4_address: 38.0.0.2
    ports:
      - "64022:22"
    restart: unless-stopped
    volumes:
      - "./shared:/shared"
      - "homedev:/home/dev"
      - "${HOME}/.codex/AGENTS.md:/home/dev/.codex/AGENTS.md"
      - "${HOME}/.codex/skills:/home/dev/.codex/skills"
      - "${HOME}/.codex/AGENTS.md:/home/dev/.claude/CLAUDE.md"
      - "${HOME}/.codex/skills:/home/dev/.claude/skills"
      - "${HOME}/.config/claude/agents:/home/dev/.claude/agents"
      - "${HOME}/.config/claude/agents:/home/dev/.config/claude/agents"
  mariadb:
    image: "mariadb:latest"
    environment:
      MYSQL_DATABASE: "database-name"
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: topsecret
      MYSQL_USER: dev
      MYSQL_PASSWORD: secret
    expose:
      - 3306
    mem_limit: 4G
    networks:
      default:
        ipv4_address: 38.0.0.3
    restart: unless-stopped
    ulimits:
      nofile:
        soft: "262144"
        hard: "262144"
    volumes:
      - mariadb:/var/lib/mysql
  postgres:
    image: "postgres"
    expose:
      - 5432
    environment:
      POSTGRES_USER: "username"
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: "database-name"
    mem_limit: 4G
    networks:
      default:
        ipv4_address: 38.0.0.4
    restart: unless-stopped
    volumes:
      - postgres:/var/lib/postgresql/data
  redis:
    image: "redis"
    expose:
      - 6379
    mem_limit: 2G
    networks:
      default:
        ipv4_address: 38.0.0.5
    restart: unless-stopped
    volumes:
      - redis:/var/lib/redis/data
  docker_server:
    image: "docker:dind"
    command: dockerd-entrypoint.sh --group 1000 --tlsverify --tlscacert=/docker-test-certificates/tlscacert.pem --tlscert=/docker-test-certificates/tlscert.pem --tlskey=/docker-test-certificates/tlskey.pem -H tcp://0.0.0.0:5676 --registry-mirror=http://registry-cache:5000 --insecure-registry=registry-cache:5000
    expose:
      - 5676
    networks:
      default:
        ipv4_address: 38.0.0.6
    privileged: true
    restart: unless-stopped
    volumes:
      - docker:/var/lib/docker
      - "./shared/docker-test-certificates:/docker-test-certificates"
  registry-cache:
    image: registry:3
    restart: unless-stopped
    environment:
      REGISTRY_PROXY_REMOTEURL: https://registry-1.docker.io
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_LOG_LEVEL: info
      OTEL_TRACES_EXPORTER: none
    volumes:
      - ./registry-data:/var/lib/registry
    networks:
      default:
        ipv4_address: 6.0.0.9
networks:
  default:
    ipam:
      driver: default
      config:
        - subnet: 38.0.0.0/16
volumes:
  homedev:
  mariadb:
  redis:
  postgres:
